<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GET & POST</title>
  </head>
  <body>
    <h3>Get request form</h3>
    <form method="get" action="http://localhost:3001/register">
      <input placeholder="enter username" name="user" type="text" />
      <input placeholder="enter password" name="password" type="password" />
      <button>Submit</button>
    </form>
    <h3>Post request form</h3>
    <form method="post" action="http://localhost:3001/register">
      <input placeholder="enter username" name="user" type="text" />
      <input placeholder="enter password" name="password" type="password" />
      <button>Submit</button>
    </form>
    <script src="oops.js"></script>
  </body>
</html>
